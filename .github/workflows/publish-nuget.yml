name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão a publicar (ex.: 1.0.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Necessário para o GitHub emitir o token OIDC do Trusted Publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publicando versão: $VERSION"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test (exclui integração)
        run: dotnet test contaazul-sdk-net-tests/contaazul-sdk-net-tests.csproj -c Release --no-build --verbosity normal

      - name: Pack
        run: >
          dotnet pack contaazul-sdk-net/contaazul-sdk-net.csproj
          -c Release
          -p:Version=${{ steps.version.outputs.version }}
          -o ./artifacts

      # Trusted Publishing: troca o token OIDC do GitHub por uma API key temporária
      # do nuget.org (válida por 1h, uso único). Deve vir logo antes do push.
      - name: NuGet login (Trusted Publishing / OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}   # nome de usuário (perfil) do nuget.org, NÃO o e-mail

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*
